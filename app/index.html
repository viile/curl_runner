      <noscript>
        <main style="max-width:780px;margin:60px auto;padding:0 24px;font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif;color:#222;">
          <h1>cURL Runner</h1>
          <p>
            A privacy-friendly developer tool that lets you paste, format and run
            <code>curl</code> commands locally — no data is ever uploaded to a third-party server.
          </p>
          <p>
            JavaScript is required to use this app. Desktop builds (macOS / Windows / Linux) are
            published at
            <a href="https://github.com/viile/curl_runner" rel="noopener">github.com/viile/curl_runner</a>
            and run system <code>curl</code> directly with no CORS limitations.
          </p>
          <h2>Features</h2>
          <ul>
            <li>Three execution engines: in-browser <code>fetch</code>, local Node proxy that spawns the native <code>curl</code> binary, and a Tauri desktop app.</li>
            <li>JSON response visualization in three switchable views: syntax-highlighted text, collapsible tree, and an interactive mind map.</li>
            <li>20 UI languages, RTL support, light / dark / system themes.</li>
            <li>Execution history stored locally in your browser; nothing is sent to a server.</li>
          </ul>
        </main>
      </noscript>
